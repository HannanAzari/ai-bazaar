<svg width="1700" height="900" viewBox="0 0 1700 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- TEMPORARY PLACEHOLDER — Golden Living Nest coffee table. Warm oiled oak,
       rounded, matte; a small accent tray on top. NOT production-ready art. -->
  <defs>
    <linearGradient id="ctTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a6713f"/>
      <stop offset="1" stop-color="#8a5c3b"/>
    </linearGradient>
    <linearGradient id="ctLeg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7c5132"/>
      <stop offset="1" stop-color="#5c3e26"/>
    </linearGradient>
  </defs>
  <!-- legs -->
  <g fill="url(#ctLeg)">
    <rect x="300" y="520" width="78" height="320" rx="28"/>
    <rect x="1320" y="520" width="78" height="320" rx="28"/>
    <rect x="520" y="540" width="70" height="300" rx="26"/>
    <rect x="1110" y="540" width="70" height="300" rx="26"/>
  </g>
  <!-- table top (rounded slab) -->
  <rect x="220" y="380" width="1260" height="190" rx="92" fill="url(#ctTop)"/>
  <!-- top highlight band (matte, restrained) -->
  <rect x="270" y="410" width="1160" height="60" rx="30" fill="#b98551" opacity="0.5"/>
  <!-- accent tray + little object (the one accent) -->
  <rect x="640" y="312" width="420" height="92" rx="44" fill="#3d7068"/>
  <rect x="700" y="262" width="120" height="80" rx="28" fill="#e8a23c"/>
  <!-- soft cool-plum contact under top -->
  <rect x="250" y="556" width="1200" height="28" rx="14" fill="#46365a" opacity="0.16"/>
</svg>
